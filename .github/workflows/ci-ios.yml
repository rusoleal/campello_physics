name: CI — Apple Platforms

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Build-only: cross-compiled static library, no simulator run.
# All platforms supported by cmake/ios.toolchain.cmake.

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── iOS ────────────────────────────────────────────────────────────
          - name: iOS device / arm64
            runner: macos-15
            platform: OS64

          - name: iOS Simulator / x86_64
            runner: macos-15       # Xcode on Apple Silicon can still target x86_64 sim
            platform: SIMULATOR64

          - name: iOS Simulator / arm64 (Apple Silicon)
            runner: macos-15
            platform: SIMULATORARM64

          # ── tvOS ───────────────────────────────────────────────────────────
          - name: tvOS device / arm64
            runner: macos-15
            platform: TVOS

          - name: tvOS Simulator / arm64
            runner: macos-15
            platform: TVOSSIMULATOR

          # ── watchOS ────────────────────────────────────────────────────────
          - name: watchOS device / arm64
            runner: macos-15
            platform: WATCHOS

          - name: watchOS Simulator / arm64
            runner: macos-15
            platform: WATCHOSSIMULATOR

          # ── visionOS ───────────────────────────────────────────────────────
          - name: visionOS device / arm64
            runner: macos-15
            platform: XROS

          - name: visionOS Simulator / arm64
            runner: macos-15
            platform: XROSSIMULATOR

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Xcode 16 supports all platforms above including visionOS 2.x.
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake
          -DPLATFORM=${{ matrix.platform }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel
